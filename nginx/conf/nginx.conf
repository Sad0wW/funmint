worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name funmint.ru www.funmint.ru;

        if ($host !~ ^(www\.)?funmint\.ru$) {
            return 444;
        }

        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name funmint.ru www.funmint.ru;

        if ($host !~ ^(www\.)?funmint\.ru$) {
            return 444;
        }

        ssl_certificate     C:/funmint/nginx/ssl/_.funmint.ru-chain.pem;
        ssl_certificate_key C:/funmint/nginx/ssl/_.funmint.ru-key.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        client_max_body_size 20M;

        root C:/funmint/src;

        access_log off;
        log_not_found off;

        location ~* \.js$ {
            try_files /static/scripts$uri =404;
            charset utf-8;
        }

        location ~* \.css$ {
            try_files /static/styles$uri =404;
            charset utf-8;
        }

        location ~* \.[A-Za-z0-9]+$ {
            try_files /resources$uri =404;
            charset utf-8;
        }

        location = /favicon.ico {
            try_files /resources/images/favicon.ico =404;
        }

        location = /thank-you {
            try_files /views/thank-you.html =404;
            charset utf-8;
        }

        location = /oops {
            try_files /views/oops.html =404;
            charset utf-8;
        }

        location = /privacy {
            try_files /views/privacy.html =404;
            charset utf-8;
        }

        location = /data-policy {
            try_files /views/data-policy.html =404;
            charset utf-8;
        }

        location = /cookie {
            try_files /views/cookie.html =404;
            charset utf-8;
        }

        location = /terms {
            try_files /views/terms.html =404;
            charset utf-8;
        }

        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_cache_bypass $http_upgrade;
        }
    }
}